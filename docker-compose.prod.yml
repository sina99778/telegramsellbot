services:
  postgres:
    image: postgres:16-alpine
    container_name: telegramsellbot-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegramsellbot}
      POSTGRES_USER: ${POSTGRES_USER:-telegramsellbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telegramsellbot} -d ${POSTGRES_DB:-telegramsellbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: telegramsellbot-redis
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegramsellbot:latest
    container_name: telegramsellbot-api
    restart: unless-stopped
    labels:
      # Restarted by the autoheal sidecar when the healthcheck fails.
      autoheal: "true"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      # Loopback-only bind: nginx (TLS via install.sh) is the ONLY public
      # entry point — Docker would otherwise punch through UFW and expose
      # plain-HTTP :8000 to the internet. If you terminate TLS on another
      # host, change this to "<lan-ip>:8000:8000" deliberately.
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    image: telegramsellbot:latest
    container_name: telegramsellbot-bot
    restart: unless-stopped
    labels:
      # Restarted by the autoheal sidecar when the heartbeat goes stale.
      autoheal: "true"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["python", "-m", "apps.bot.main"]
    healthcheck:
      # Bot is healthy only if its background heartbeat file was updated in
      # the last 60s. Catches dispatcher hangs, deadlocks, and silent crashes
      # that the previous `python -c sys.exit(0)` check missed.
      # `$$` keeps the dollar sign for the in-container shell — docker-compose
      # treats single `$` as YAML interpolation and refuses to parse it.
      test: ["CMD-SHELL", "test -f /tmp/bot_heartbeat && test $$(( $$(date +%s) - $$(stat -c %Y /tmp/bot_heartbeat) )) -lt 60"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: telegramsellbot:latest
    container_name: telegramsellbot-worker
    restart: unless-stopped
    labels:
      # Restarted by the autoheal sidecar when the heartbeat goes stale.
      autoheal: "true"
    env_file:
      - .env
    volumes:
      # The backup job packs the real .env FILE into every bundle (key
      # "env" in the tar — restore.sh restores it). `env_file:` above only
      # injects VARIABLES into the process; without this read-only mount
      # there is no .env inside the container and bundles would ship with
      # the "no .env / no APP_SECRET_KEY" warning instead of the file.
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["python", "-m", "apps.worker.main"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker_heartbeat && test $$(( $$(date +%s) - $$(stat -c %Y /tmp/worker_heartbeat) )) -lt 120"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  autoheal:
    # Plain (non-Swarm) docker compose never acts on health status — a
    # container marked "unhealthy" by its healthcheck just stays running
    # (restart: unless-stopped only fires when PID 1 exits). This sidecar
    # closes the loop: it restarts any container labeled autoheal=true once
    # Docker reports it unhealthy, so a hung bot/worker dispatcher recovers
    # without an operator running doctor.sh.
    # SECURITY: mounting docker.sock gives this container root-equivalent
    # control over the Docker host. Mitigations: the image is pinned to a
    # fixed release, and network_mode: none cuts off all network access —
    # it can only talk to the local Docker socket. Do not add ports or
    # networks to this service.
    image: willfarrell/autoheal:1.2.0
    container_name: telegramsellbot-autoheal
    restart: always
    network_mode: none
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
