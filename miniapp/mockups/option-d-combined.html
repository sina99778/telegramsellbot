<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>نمونه D — ترکیبی (پیشنهادی)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
<style>
  :root{
    /* پالت رنگیِ نمونه C */
    --bg:#070611; --card:rgba(20,16,36,.6); --card2:#181430; --bd:rgba(255,255,255,.08); --bd2:rgba(255,255,255,.15);
    --tx:#f5f3ff; --mut:rgba(245,243,255,.64); --faint:rgba(245,243,255,.42);
    --p1:#ff4d8d; --p2:#7c5cff; --p3:#1fd1ff; --emer:#33e0a0; --amber:#ffc24d;
    --grad:linear-gradient(120deg,#ff4d8d,#7c5cff 55%,#1fd1ff);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:Vazirmatn,system-ui,sans-serif;background:#040309;color:var(--tx);
       display:flex;justify-content:center;min-height:100vh;padding:18px 0}
  .phone{width:390px;max-width:100%;min-height:800px;position:relative;overflow:hidden;
         background:var(--bg);border-radius:34px;border:1px solid rgba(255,255,255,.06);
         box-shadow:0 30px 80px rgba(0,0,0,.65)}
  /* پس‌زمینه‌ی هاله‌ای (از A) با رنگ‌های C */
  .aurora{position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(58% 40% at 14% 6%,rgba(255,77,141,.20),transparent 60%),
      radial-gradient(55% 38% at 90% 12%,rgba(124,92,255,.20),transparent 60%),
      radial-gradient(70% 50% at 50% 104%,rgba(31,209,255,.14),transparent 60%);}
  .scroll{position:relative;padding:20px 16px 100px}
  /* header */
  .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .who{display:flex;align-items:center;gap:11px}
  .av{width:48px;height:48px;border-radius:16px;background:var(--grad);display:grid;place-items:center;
      font-weight:800;color:#fff;font-size:20px;box-shadow:0 0 22px rgba(124,92,255,.55)}
  .who b{display:block;font-size:15px}
  .who span{font-size:12px;color:var(--mut)}
  .iconbtn{width:44px;height:44px;border-radius:15px;background:var(--card);border:1px solid var(--bd);
           display:grid;place-items:center;color:var(--mut);backdrop-filter:blur(10px)}
  /* hero: کارت شیشه‌ای (A) + متنِ گرادیانیِ C + دکمه‌های نرمِ B */
  .hero{position:relative;border-radius:26px;padding:22px;margin-bottom:20px;overflow:hidden;
        background:var(--card);border:1px solid var(--bd2);backdrop-filter:blur(14px)}
  .hero .glow{position:absolute;width:220px;height:200px;border-radius:50%;background:var(--grad);
              filter:blur(64px);opacity:.32;top:-70px;left:-30px}
  .hero .lbl{font-size:12.5px;color:var(--mut);display:flex;align-items:center;gap:6px;position:relative}
  .hero .bal{font-size:40px;font-weight:800;margin:6px 0 16px;direction:ltr;text-align:right;letter-spacing:-.8px;position:relative;
             background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .btns{display:flex;gap:10px;position:relative}
  /* دکمه‌های نرم و گردِ B */
  .btn{flex:1;border:none;border-radius:16px;padding:14px;font-family:inherit;font-weight:800;font-size:14px;
       display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;color:var(--tx)}
  .btn.pri{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(255,77,141,.32)}
  .btn.sec{background:rgba(255,255,255,.10);border:1px solid var(--bd2)}
  /* quick actions: استایل چیپِ B + رنگ‌های C */
  .quick{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
  .qa{background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:16px 8px;text-align:center;backdrop-filter:blur(10px)}
  .qchip{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;margin:0 auto 9px;font-size:22px}
  .qa b{font-size:12px;font-weight:700}
  /* section title (C accent bar) */
  .sec{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;margin:0 2px 14px}
  .sec i{width:4px;height:18px;border-radius:4px;background:var(--grad)}
  .sec::after{content:"";flex:1;height:1px;background:var(--bd)}
  /* config card: حلقه‌ی مصرف (A) + رنگ/گلوی C + شیشه */
  .cfg{background:var(--card);border:1px solid var(--bd);border-radius:22px;padding:16px;margin-bottom:12px;
       display:flex;gap:14px;align-items:center;backdrop-filter:blur(10px)}
  .ring{width:76px;height:76px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;position:relative}
  .ring.ok{background:conic-gradient(from 220deg,#1fd1ff,#7c5cff,#ff4d8d 14%,rgba(255,255,255,.07) 14% 100%);
           filter:drop-shadow(0 0 10px rgba(124,92,255,.4))}
  .ring.warn{background:conic-gradient(#ffc24d 0 68%,rgba(255,255,255,.07) 68% 100%);filter:drop-shadow(0 0 10px rgba(255,194,77,.35))}
  .ring::before{content:"";position:absolute;inset:7px;border-radius:50%;background:#100c1e}
  .ring b{position:relative;font-size:15px;font-weight:800}
  .ring span{position:relative;display:block;font-size:8.5px;color:var(--mut);text-align:center}
  .cfg-info{flex:1;min-width:0}
  .cfg-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .cfg-top b{font-size:14.5px}
  .pill{font-size:10.5px;font-weight:800;padding:4px 11px;border-radius:999px;background:rgba(51,224,160,.16);color:#5ff3bc;
        box-shadow:0 0 12px rgba(51,224,160,.22)}
  .pill.warn{background:rgba(255,194,77,.16);color:#ffd98a;box-shadow:0 0 12px rgba(255,194,77,.2)}
  .meta{display:flex;gap:14px;font-size:11.5px;color:var(--mut)}
  .meta b{color:var(--tx);font-weight:700;direction:ltr}
  /* nav: شیشه‌ای (A) + ایندیکیتورِ قرصیِ B + نئونِ C */
  .nav{position:absolute;left:14px;right:14px;bottom:14px;height:66px;border-radius:24px;
       background:rgba(12,9,24,.82);border:1px solid var(--bd2);backdrop-filter:blur(16px);
       display:flex;align-items:center;justify-content:space-around;padding:0 8px}
  .nb{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);font-size:10px;font-weight:700;
      padding:8px 12px;border-radius:16px}
  .nb .ic{width:22px;height:22px}
  .nb.on{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(124,92,255,.4)}
  svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="phone">
  <div class="aurora"></div>
  <div class="scroll">
    <div class="hdr">
      <div class="who"><div class="av">S</div><div><b>سینا</b><span>V2rays Emergency</span></div></div>
      <button class="iconbtn"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 1 0 2.13-5.88L21 8"/></svg></button>
    </div>

    <div class="hero">
      <div class="glow"></div>
      <div class="lbl">💎 موجودی کیف پول</div>
      <div class="bal">$199.63</div>
      <div class="btns">
        <button class="btn pri">＋ شارژ حساب</button>
        <button class="btn sec">🛒 خرید سرویس</button>
      </div>
    </div>

    <div class="quick">
      <div class="qa"><div class="qchip" style="background:rgba(255,77,141,.16)">🛒</div><b>خرید</b></div>
      <div class="qa"><div class="qchip" style="background:rgba(124,92,255,.16)">🔄</div><b>تمدید</b></div>
      <div class="qa"><div class="qchip" style="background:rgba(31,209,255,.16)">💬</div><b>پشتیبانی</b></div>
    </div>

    <div class="sec"><i></i> سرویس‌های فعال</div>
    <div class="cfg">
      <div class="ring ok"><b>14%</b><span>مصرف</span></div>
      <div class="cfg-info">
        <div class="cfg-top"><b>MyVPN</b><span class="pill">فعال</span></div>
        <div class="meta"><span>حجم <b>0.98/6.9 GB</b></span><span>زمان <b>176 روز</b></span></div>
      </div>
    </div>
    <div class="cfg">
      <div class="ring warn"><b>68%</b><span>مصرف</span></div>
      <div class="cfg-info">
        <div class="cfg-top"><b>phone-1</b><span class="pill warn">رو به اتمام</span></div>
        <div class="meta"><span>حجم <b>20.4/30 GB</b></span><span>زمان <b>12 روز</b></span></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <div class="nb on"><svg class="ic" viewBox="0 0 24 24"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>خانه</div>
    <div class="nb"><svg class="ic" viewBox="0 0 24 24"><path d="M3 9 5 3h14l2 6"/><path d="M3 9v11h18V9"/></svg>فروشگاه</div>
    <div class="nb"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="6" rx="2"/><rect x="3" y="14" width="18" height="6" rx="2"/></svg>سرویس‌ها</div>
    <div class="nb"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="3"/><path d="M3 10h18"/></svg>کیف پول</div>
    <div class="nb"><svg class="ic" viewBox="0 0 24 24"><path d="M4 5h16v11H7l-3 3z"/></svg>پشتیبانی</div>
  </div>
</div>
</body>
</html>
